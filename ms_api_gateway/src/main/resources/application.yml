server:
  port: 8080

spring:
  application:
    name: ms-api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: ms-usuario
          uri: lb://ms-usuario
          predicates:
            - Path=/api/v1/usuarios/**, /api/v1/auth/**

        - id: ms-catalogo
          uri: lb://ms-catalogo
          predicates:
            - Path=/api/v1/perfumes/**

        - id: ms-tienda-oferta
          uri: lb://ms-tienda-oferta
          predicates:
            - Path=/api/v1/tiendas/**, /api/v1/ofertas/**, /api/v1/ventas/**

        - id: ms-analisis-experiencia
          uri: lb://ms-analisis-experiencia
          predicates:
            - Path=/api/experiencia/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost